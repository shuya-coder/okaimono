<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1d74d8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="買い物リスト">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>買い物リスト</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="assets/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="assets/icon-192.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div>
        <p class="eyebrow">買い物中でもすばやく操作</p>
        <h1>買い物リスト</h1>
      </div>
      <button id="themeQuickToggle" class="icon-button" type="button" aria-label="ダークモード切替">🌙</button>
    </header>

    <main id="mainContent">
      <section class="tab-panel active" data-panel="list" aria-labelledby="listTabButton">
        <details class="collapsible-card add-card" id="addItemPanel">
          <summary>
            <span>
              <strong>＋ 商品を追加</strong>
              <small>商品名・個数・カテゴリーを入力</small>
            </span>
            <span class="chevron" aria-hidden="true">⌄</span>
          </summary>
          <form id="addItemForm" class="form-stack add-form-body">
            <label>
              商品名
              <input id="itemName" type="text" autocomplete="off" placeholder="例: 牛乳" required>
            </label>
            <div class="form-row">
              <label>
                個数
                <div class="stepper">
                  <button id="decreaseCount" type="button" aria-label="個数を減らす">−</button>
                  <input id="itemCount" type="number" inputmode="numeric" min="1" value="1" required aria-label="個数">
                  <button id="increaseCount" type="button" aria-label="個数を増やす">＋</button>
                </div>
              </label>
              <label>
                カテゴリー
                <select id="itemCategory" required></select>
              </label>
            </div>
            <button class="primary-button full-width" type="submit">➕ リストに追加</button>
          </form>
        </details>

        <div class="list-status">
          <span id="shoppingCountSummary" class="badge" aria-live="polite">0件</span>
        </div>
        <section class="list-section" aria-label="買い物リスト">
          <div id="shoppingList" class="item-list" aria-live="polite"></div>
        </section>
      </section>

      <section class="tab-panel" data-panel="cart" aria-labelledby="cartTabButton">
        <section class="card">
          <div class="section-title">
            <h2>カゴ</h2>
            <span id="cartCountSummary" class="badge" aria-live="polite">0件</span>
          </div>
          <div id="cartList" class="item-list" aria-live="polite"></div>
          <button id="checkoutButton" class="primary-button full-width checkout-button" type="button" disabled>会計済み</button>
        </section>
      </section>

      <section class="tab-panel" data-panel="history" aria-labelledby="historyTabButton">
        <details class="collapsible-card" id="historySearchPanel">
          <summary>
            <span>
              <strong>🔍 履歴を探す</strong>
              <small id="historyFilterSummary">商品名・日付・カテゴリーで絞り込み</small>
            </span>
            <span class="chevron" aria-hidden="true">⌄</span>
          </summary>
          <div class="filter-body">
            <label>
              商品名
              <input id="historySearch" type="search" placeholder="商品名で検索" autocomplete="off">
            </label>
            <label>
              開始日
              <input id="historyStartDate" type="date">
            </label>
            <label>
              終了日
              <input id="historyEndDate" type="date">
            </label>
            <label>
              カテゴリー
              <select id="historyCategoryFilter"></select>
            </label>
            <button id="resetHistoryFilterButton" class="secondary-button full-width" type="button">リセット</button>
          </div>
        </details>
        <div class="list-status">
          <span id="historyCountSummary" class="badge" aria-live="polite">0件</span>
        </div>
        <div id="historyList" class="item-list" aria-live="polite"></div>
      </section>

      <section class="tab-panel" data-panel="settings" aria-labelledby="settingsTabButton">
        <section class="card">
          <div class="section-title">
            <h2>カテゴリー</h2>
            <span class="badge">Version <span id="appVersion"></span></span>
          </div>
          <form id="categoryForm" class="category-form">
            <label>
              名前
              <input id="categoryName" type="text" autocomplete="off" placeholder="例: 冷凍食品" required>
            </label>
            <label>
              色
              <input id="categoryColor" type="color" value="#4CAF50">
            </label>
            <button class="primary-button" type="submit">📂 追加</button>
          </form>
          <div id="categoryList" class="category-list" aria-live="polite"></div>
        </section>

        <section class="card">
          <div class="section-title">
            <h2>設定</h2>
            <span class="badge">端末に保存</span>
          </div>
          <div class="settings-grid">
            <button id="darkModeButton" class="secondary-button" type="button">🌙 ダークモード</button>
            <button id="exportCsvButton" class="secondary-button" type="button">⬇ CSV保存</button>
            <label class="file-button">
              ⬆ CSV読込
              <input id="importCsvInput" type="file" accept=".csv,text/csv">
            </label>
            <button id="resetStorageButton" class="danger-button" type="button">初期化</button>
          </div>
          <p class="note">データはこのスマートフォンまたはブラウザに保存されます。オフラインでも使えます。</p>
        </section>
      </section>
    </main>
  </div>

  <nav class="tab-nav" aria-label="メインメニュー">
    <button id="listTabButton" class="tab-button active" type="button" data-tab="list">🛒<span>リスト</span></button>
    <button id="cartTabButton" class="tab-button" type="button" data-tab="cart">🧺<span>カゴ</span></button>
    <button id="historyTabButton" class="tab-button" type="button" data-tab="history">📜<span>履歴</span></button>
    <button id="settingsTabButton" class="tab-button" type="button" data-tab="settings">⚙<span>設定</span></button>
  </nav>

  <dialog id="editDialog" aria-labelledby="editDialogTitle">
    <form id="editForm" method="dialog" class="dialog-card">
      <h2 id="editDialogTitle">商品を編集</h2>
      <input id="editItemId" type="hidden">
      <label>
        商品名
        <input id="editName" type="text" required>
      </label>
      <label>
        個数
        <input id="editCount" type="number" inputmode="numeric" min="1" value="1" required>
      </label>
      <label>
        カテゴリー
        <select id="editCategory"></select>
      </label>
      <div class="dialog-actions">
        <button class="secondary-button" type="button" id="cancelEditButton">キャンセル</button>
        <button class="primary-button" type="submit">保存</button>
      </div>
    </form>
  </dialog>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="js/storage.js"></script>
  <script src="js/category.js"></script>
  <script src="js/shopping.js"></script>
  <script src="js/history.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
